{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block head %}
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5rem 1.5rem 3rem;
    position: relative;
    overflow: hidden;
  }

  .auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    animation: fadeUp 0.6s ease both;
  }

  .form-input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  .form-input.error {
    border-color: red;
  }

  .submit-btn {
    width: 100%;
    padding: 0.9rem;
    margin-top: 1rem;
    background: cyan;
    border: none;
    cursor: pointer;
  }

  .error-banner {
    background: #ffdddd;
    padding: 10px;
    margin-bottom: 10px;
    color: red;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">

  <div class="auth-card {% if errors is defined and errors %}shake{% endif %}">

    <h2>Login</h2>

    {% if errors is defined and errors %}
      <div class="error-banner">
        {% for e in errors %}
          {{ e }}<br>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_post') }}">

      <input class="form-input {% if errors %}error{% endif %}"
             type="text"
             name="username"
             placeholder="Username"
             value="{{ form.get('username','') if form else '' }}"
             required>

      <input class="form-input {% if errors %}error{% endif %}"
             type="password"
             name="password"
             placeholder="Password"
             required>

      <button type="submit" class="submit-btn">Login</button>

    </form>

    <p>
      Don't have an account?
      <a href="{{ url_for('register_get') }}">Register</a>
    </p>

  </div>

</div>
{% endblock %}
